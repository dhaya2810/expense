<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --danger: #f72585;
            --warning: #f8961e;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --light-gray: #e9ecef;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f5f7fb;
            color: var(--dark);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 1.5rem 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
            font-weight: 700;
        }
        
        .logo i {
            font-size: 2rem;
        }
        
        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        
        nav a:hover, nav a.active {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            margin: 30px 0;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--light-gray);
        }
        
        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary);
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--light-gray);
            border-radius: 5px;
            font-size: 1rem;
        }
        
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: background 0.3s;
        }
        
        button:hover {
            background: var(--secondary);
        }
        
        .btn-danger {
            background: var(--danger);
        }
        
        .btn-danger:hover {
            background: #d1145a;
        }
        
        .btn-success {
            background: var(--success);
        }
        
        .btn-success:hover {
            background: #3ab0d6;
        }
        
        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--light-gray);
            transition: background 0.3s;
        }
        
        .expense-item:hover {
            background: var(--light-gray);
        }
        
        .expense-info {
            flex: 1;
        }
        
        .expense-title {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .expense-meta {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            color: var(--gray);
        }
        
        .expense-amount {
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .expense-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: var(--gray);
            transition: color 0.3s;
        }
        
        .edit-btn:hover {
            color: var(--primary);
        }
        
        .delete-btn:hover {
            color: var(--danger);
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .summary-cards {
                grid-template-columns: 1fr;
            }
        }
        
        .summary-card {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            color: white;
        }
        
        .total-expenses {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        
        .month-expenses {
            background: linear-gradient(135deg, var(--success), #3ab0d6);
        }
        
        .week-expenses {
            background: linear-gradient(135deg, var(--warning), #e67e22);
        }
        
        .summary-card h3 {
            font-size: 0.9rem;
            margin-bottom: 5px;
            opacity: 0.9;
        }
        
        .summary-card .amount {
            font-size: 1.8rem;
            font-weight: 700;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .chart-container {
            height: 250px;
            margin-top: 20px;
        }
        
        .no-expenses {
            text-align: center;
            padding: 30px;
            color: var(--gray);
        }
        
        .no-expenses i {
            font-size: 3rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }
        
        footer {
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
            border-top: 1px solid var(--light-gray);
            color: var(--gray);
            font-size: 0.9rem;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--light-gray);
        }
        
        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--gray);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-chart-pie"></i>
                    <span>ExpenseTracker</span>
                </div>
                <nav>
                    <ul>
                        <li><a href="#" class="active">Dashboard</a></li>
                        <li><a href="#">Reports</a></li>
                        <li><a href="#">Settings</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    
    <div class="container">
        <div class="summary-cards">
            <div class="summary-card total-expenses">
                <h3>Total Expenses</h3>
                <div class="amount" id="total-amount">$0.00</div>
            </div>
            <div class="summary-card month-expenses">
                <h3>This Month</h3>
                <div class="amount" id="month-amount">$0.00</div>
            </div>
            <div class="summary-card week-expenses">
                <h3>This Week</h3>
                <div class="amount" id="week-amount">$0.00</div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="left-column">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Add New Expense</h2>
                    </div>
                    <form id="expense-form">
                        <div class="form-group">
                            <label for="expense-title">Title</label>
                            <input type="text" id="expense-title" placeholder="Enter expense title" required>
                        </div>
                        <div class="form-group">
                            <label for="expense-amount">Amount ($)</label>
                            <input type="number" id="expense-amount" placeholder="0.00" step="0.01" min="0" required>
                        </div>
                        <div class="form-group">
                            <label for="expense-category">Category</label>
                            <select id="expense-category" required>
                                <option value="">Select a category</option>
                                <option value="Food">Food</option>
                                <option value="Transportation">Transportation</option>
                                <option value="Entertainment">Entertainment</option>
                                <option value="Utilities">Utilities</option>
                                <option value="Healthcare">Healthcare</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="expense-date">Date</label>
                            <input type="date" id="expense-date" required>
                        </div>
                        <div class="form-group">
                            <label for="expense-description">Description (Optional)</label>
                            <textarea id="expense-description" rows="3" placeholder="Add any additional details"></textarea>
                        </div>
                        <button type="submit" class="btn-success">
                            <i class="fas fa-plus"></i> Add Expense
                        </button>
                    </form>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Spending by Category</h2>
                    </div>
                    <div class="chart-container">
                        <canvas id="category-chart"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="right-column">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Recent Expenses</h2>
                        <div class="filters">
                            <select id="category-filter">
                                <option value="">All Categories</option>
                                <option value="Food">Food</option>
                                <option value="Transportation">Transportation</option>
                                <option value="Entertainment">Entertainment</option>
                                <option value="Utilities">Utilities</option>
                                <option value="Healthcare">Healthcare</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Other">Other</option>
                            </select>
                            <input type="date" id="date-filter">
                        </div>
                    </div>
                    <div id="expenses-list">
                        <!-- Expenses will be dynamically added here -->
                        <div class="no-expenses">
                            <i class="fas fa-receipt"></i>
                            <p>No expenses added yet. Start by adding your first expense!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Edit Expense Modal -->
    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Expense</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="edit-expense-form">
                <input type="hidden" id="edit-expense-id">
                <div class="form-group">
                    <label for="edit-expense-title">Title</label>
                    <input type="text" id="edit-expense-title" required>
                </div>
                <div class="form-group">
                    <label for="edit-expense-amount">Amount ($)</label>
                    <input type="number" id="edit-expense-amount" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label for="edit-expense-category">Category</label>
                    <select id="edit-expense-category" required>
                        <option value="Food">Food</option>
                        <option value="Transportation">Transportation</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="edit-expense-date">Date</label>
                    <input type="date" id="edit-expense-date" required>
                </div>
                <div class="form-group">
                    <label for="edit-expense-description">Description</label>
                    <textarea id="edit-expense-description" rows="3"></textarea>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn-success">Save Changes</button>
                    <button type="button" class="close-modal">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    
    <footer>
        <div class="container">
            <p>ExpenseTracker &copy; 2024 - Track your expenses easily</p>
        </div>
    </footer>

    <script>
        // DOM Elements
        const expenseForm = document.getElementById('expense-form');
        const expensesList = document.getElementById('expenses-list');
        const editModal = document.getElementById('edit-modal');
        const editExpenseForm = document.getElementById('edit-expense-form');
        const closeModalButtons = document.querySelectorAll('.close-modal');
        const categoryFilter = document.getElementById('category-filter');
        const dateFilter = document.getElementById('date-filter');
        
        // Summary elements
        const totalAmountElement = document.getElementById('total-amount');
        const monthAmountElement = document.getElementById('month-amount');
        const weekAmountElement = document.getElementById('week-amount');
        
        // Chart variable
        let categoryChart;
        
        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            // Set today's date as default for the date input
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('expense-date').value = today;
            
            // Load expenses from localStorage
            loadExpenses();
            
            // Initialize chart
            initChart();
            
            // Update summary
            updateSummary();
        });
        
        // Expense form submission
        expenseForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form values
            const title = document.getElementById('expense-title').value;
            const amount = parseFloat(document.getElementById('expense-amount').value);
            const category = document.getElementById('expense-category').value;
            const date = document.getElementById('expense-date').value;
            const description = document.getElementById('expense-description').value;
            
            // Create expense object
            const expense = {
                id: Date.now(), // Simple ID generation
                title,
                amount,
                category,
                date,
                description
            };
            
            // Add expense to the list
            addExpense(expense);
            
            // Reset form
            expenseForm.reset();
            document.getElementById('expense-date').value = new Date().toISOString().split('T')[0];
        });
        
        // Edit expense form submission
        editExpenseForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form values
            const id = parseInt(document.getElementById('edit-expense-id').value);
            const title = document.getElementById('edit-expense-title').value;
            const amount = parseFloat(document.getElementById('edit-expense-amount').value);
            const category = document.getElementById('edit-expense-category').value;
            const date = document.getElementById('edit-expense-date').value;
            const description = document.getElementById('edit-expense-description').value;
            
            // Update expense
            updateExpense(id, { title, amount, category, date, description });
            
            // Close modal
            closeModal();
        });
        
        // Close modal when clicking close button or outside modal
        closeModalButtons.forEach(button => {
            button.addEventListener('click', closeModal);
        });
        
        // Filter expenses when filter values change
        categoryFilter.addEventListener('change', filterExpenses);
        dateFilter.addEventListener('change', filterExpenses);
        
        // Function to add an expense
        function addExpense(expense) {
            // Get existing expenses from localStorage
            const expenses = getExpensesFromStorage();
            
            // Add new expense
            expenses.push(expense);
            
            // Save back to localStorage
            saveExpensesToStorage(expenses);
            
            // Update UI
            displayExpenses(expenses);
            updateSummary();
            updateChart();
        }
        
        // Function to update an expense
        function updateExpense(id, updatedExpense) {
            // Get existing expenses from localStorage
            const expenses = getExpensesFromStorage();
            
            // Find index of expense to update
            const index = expenses.findIndex(expense => expense.id === id);
            
            if (index !== -1) {
                // Update expense
                expenses[index] = { ...expenses[index], ...updatedExpense };
                
                // Save back to localStorage
                saveExpensesToStorage(expenses);
                
                // Update UI
                displayExpenses(expenses);
                updateSummary();
                updateChart();
            }
        }
        
        // Function to delete an expense
        function deleteExpense(id) {
            if (confirm('Are you sure you want to delete this expense?')) {
                // Get existing expenses from localStorage
                const expenses = getExpensesFromStorage();
                
                // Filter out the expense to delete
                const filteredExpenses = expenses.filter(expense => expense.id !== id);
                
                // Save back to localStorage
                saveExpensesToStorage(filteredExpenses);
                
                // Update UI
                displayExpenses(filteredExpenses);
                updateSummary();
                updateChart();
            }
        }
        
        // Function to open edit modal
        function openEditModal(expense) {
            // Populate form with expense data
            document.getElementById('edit-expense-id').value = expense.id;
            document.getElementById('edit-expense-title').value = expense.title;
            document.getElementById('edit-expense-amount').value = expense.amount;
            document.getElementById('edit-expense-category').value = expense.category;
            document.getElementById('edit-expense-date').value = expense.date;
            document.getElementById('edit-expense-description').value = expense.description || '';
            
            // Show modal
            editModal.style.display = 'flex';
        }
        
        // Function to close modal
        function closeModal() {
            editModal.style.display = 'none';
        }
        
        // Function to load expenses from localStorage
        function loadExpenses() {
            const expenses = getExpensesFromStorage();
            displayExpenses(expenses);
        }
        
        // Function to get expenses from localStorage
        function getExpensesFromStorage() {
            const expensesJSON = localStorage.getItem('expenses');
            return expensesJSON ? JSON.parse(expensesJSON) : [];
        }
        
        // Function to save expenses to localStorage
        function saveExpensesToStorage(expenses) {
            localStorage.setItem('expenses', JSON.stringify(expenses));
        }
        
        // Function to display expenses in the UI
        function displayExpenses(expenses) {
            // Apply filters
            const filteredExpenses = filterExpensesList(expenses);
            
            // Clear current list
            expensesList.innerHTML = '';
            
            if (filteredExpenses.length === 0) {
                expensesList.innerHTML = `
                    <div class="no-expenses">
                        <i class="fas fa-receipt"></i>
                        <p>No expenses found. Try changing your filters.</p>
                    </div>
                `;
                return;
            }
            
            // Sort expenses by date (newest first)
            filteredExpenses.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            // Add each expense to the list
            filteredExpenses.forEach(expense => {
                const expenseElement = document.createElement('div');
                expenseElement.className = 'expense-item';
                expenseElement.innerHTML = `
                    <div class="expense-info">
                        <div class="expense-title">${expense.title}</div>
                        <div class="expense-meta">
                            <span class="expense-category">${expense.category}</span>
                            <span class="expense-date">${formatDate(expense.date)}</span>
                            ${expense.description ? `<span class="expense-description">${expense.description}</span>` : ''}
                        </div>
                    </div>
                    <div class="expense-amount">$${expense.amount.toFixed(2)}</div>
                    <div class="expense-actions">
                        <button class="action-btn edit-btn" data-id="${expense.id}">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="action-btn delete-btn" data-id="${expense.id}">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
                
                expensesList.appendChild(expenseElement);
            });
            
            // Add event listeners to edit and delete buttons
            document.querySelectorAll('.edit-btn').forEach(button => {
                button.addEventListener('click', function() {
                    const id = parseInt(this.getAttribute('data-id'));
                    const expenses = getExpensesFromStorage();
                    const expense = expenses.find(exp => exp.id === id);
                    if (expense) openEditModal(expense);
                });
            });
            
            document.querySelectorAll('.delete-btn').forEach(button => {
                button.addEventListener('click', function() {
                    const id = parseInt(this.getAttribute('data-id'));
                    deleteExpense(id);
                });
            });
        }
        
        // Function to filter expenses based on selected filters
        function filterExpenses() {
            const expenses = getExpensesFromStorage();
            displayExpenses(expenses);
        }
        
        // Function to apply filters to expenses list
        function filterExpensesList(expenses) {
            const category = categoryFilter.value;
            const date = dateFilter.value;
            
            return expenses.filter(expense => {
                const categoryMatch = !category || expense.category === category;
                const dateMatch = !date || expense.date === date;
                
                return categoryMatch && dateMatch;
            });
        }
        
        // Function to update the summary cards
        function updateSummary() {
            const expenses = getExpensesFromStorage();
            
            // Calculate total expenses
            const totalAmount = expenses.reduce((sum, expense) => sum + expense.amount, 0);
            totalAmountElement.textContent = `$${totalAmount.toFixed(2)}`;
            
            // Calculate this month's expenses
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();
            
            const monthAmount = expenses
                .filter(expense => {
                    const expenseDate = new Date(expense.date);
                    return expenseDate.getMonth() === currentMonth && 
                           expenseDate.getFullYear() === currentYear;
                })
                .reduce((sum, expense) => sum + expense.amount, 0);
                
            monthAmountElement.textContent = `$${monthAmount.toFixed(2)}`;
            
            // Calculate this week's expenses
            const startOfWeek = new Date(now);
            startOfWeek.setDate(now.getDate() - now.getDay());
            startOfWeek.setHours(0, 0, 0, 0);
            
            const weekAmount = expenses
                .filter(expense => {
                    const expenseDate = new Date(expense.date);
                    return expenseDate >= startOfWeek;
                })
                .reduce((sum, expense) => sum + expense.amount, 0);
                
            weekAmountElement.textContent = `$${weekAmount.toFixed(2)}`;
        }
        
        // Function to initialize the chart
        function initChart() {
            const ctx = document.getElementById('category-chart').getContext('2d');
            categoryChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: [
                            '#4361ee', '#3a0ca3', '#4cc9f0', '#f72585', 
                            '#7209b7', '#3f37c9', '#560bad', '#480ca8'
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
            
            updateChart();
        }
        
        // Function to update the chart with current data
        function updateChart() {
            const expenses = getExpensesFromStorage();
            
            // Group expenses by category
            const categories = {};
            expenses.forEach(expense => {
                if (categories[expense.category]) {
                    categories[expense.category] += expense.amount;
                } else {
                    categories[expense.category] = expense.amount;
                }
            });
            
            // Update chart data
            categoryChart.data.labels = Object.keys(categories);
            categoryChart.data.datasets[0].data = Object.values(categories);
            categoryChart.update();
        }
        
        // Helper function to format date
        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateString).toLocaleDateString(undefined, options);
        }
